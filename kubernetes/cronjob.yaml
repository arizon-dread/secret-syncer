apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-syncer
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: secret-syncer
              image: secret-syncer:v1.0.0
              env:
                - name: configPath
                  value: /etc/sync
              volumeMounts:
                - name: sync-config
                  mountPath: /etc/sync
          restartPolicy: OnFailure
          volumes:
            - name: config
              configMap:
                - name: sync-config
                  items:
                    - key: config.yaml
                      path: config.yaml
